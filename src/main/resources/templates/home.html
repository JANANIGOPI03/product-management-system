<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Welcome to Our Store</h1>

    <div class="text-end mb-4">
        <a th:href="@{/}" class="btn btn-secondary">Admin View</a>
		<a th:href="@{/cart}" class="btn btn-dark">View Cart</a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="product : ${listProducts}">
            <div class="card h-100 shadow-sm">

                <img th:src="${product.imageUrl}"
                     class="card-img-top"
                     alt="Product Image"
                     style="height: 250px; object-fit: cover;">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${product.productName}">Product Name</h5>

                    <p class="card-text" th:text="${product.description}">Product Description</p>

                    <p class="card-text">
                        <strong>Quality:</strong>
                        <span th:text="${product.productQuality}"></span>
                    </p>

                    <p class="card-text">
                        <strong>Stock:</strong>
                        <span th:text="${product.stockQuantity}"></span>
                    </p>

                    <p class="card-text fw-bold"
                       th:text="'$' + ${#numbers.formatDecimal(product.productPrice, 1, 2)}">$0.00</p>

				    <a th:href="@{/addToCart/{id}(id=${product.id})}"
					      class="btn btn-primary mt-auto"
					      th:classappend="${product.stockQuantity == 0} ? ' disabled' : ''">
					       Add to Cart
					</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
