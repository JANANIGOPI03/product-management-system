<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Product Management System</h1>
    <hr>
    <h2 class="mb-4">Save Product</h2>

    <form th:action="@{/saveProduct}" th:object="${product}" method="post">

        <div class="mb-3">
            <input type="text"
                   th:field="*{productName}"
                   placeholder="Product Name"
                   class="form-control">
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('productName')}"
                 th:errors="*{productName}"></div>
        </div>

        <div class="mb-3">
            <input type="number"
                   th:field="*{productId}"
                   placeholder="Product Id"
                   class="form-control">
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('productId')}"
                 th:errors="*{productId}"></div>
        </div>

        <div class="mb-3">
            <input type="text"
                   th:field="*{productQuality}"
                   placeholder="Product Quality"
                   class="form-control">
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('productQuality')}"
                 th:errors="*{productQuality}"></div>
        </div>

        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number"
                       step="0.01"
                       th:field="*{productPrice}"
                       placeholder="Product Price"
                       class="form-control">
            </div>
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('productPrice')}"
                 th:errors="*{productPrice}"></div>
        </div>

        <div class="mb-3">
            <textarea th:field="*{description}"
                      placeholder="Product Description"
                      class="form-control"
                      rows="4"></textarea>
        </div>

        <div class="mb-3">
            <input type="text"
                   th:field="*{imageUrl}"
                   placeholder="Product Image URL"
                   class="form-control">
        </div>

        <div class="mb-4">
            <input type="number"
                   th:field="*{stockQuantity}"
                   placeholder="Stock Quantity"
                   class="form-control">
            <div class="text-danger mt-1"
                 th:if="${#fields.hasErrors('stockQuantity')}"
                 th:errors="*{stockQuantity}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
        <a th:href="@{/}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
