<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Product Management System</h1>
    <hr>
    <h2 class="mb-4">Update Product</h2>

    <form th:action="@{/saveProduct}" th:object="${product}" method="POST">

        <input type="hidden" th:field="*{id}">

        <input type="text"
               th:field="*{productName}"
               placeholder="Product Name"
               class="form-control mb-3"
               required>

        <input type="number"
               th:field="*{productId}"
               placeholder="Product Id"
               class="form-control mb-3"
               required>

        <input type="text"
               th:field="*{productQuality}"
               placeholder="Product Quality"
               class="form-control mb-3"
               required>

        <div class="input-group mb-3">
            <span class="input-group-text">$</span>
            <input type="number"
                   step="0.01"
                   th:field="*{productPrice}"
                   placeholder="Product Price"
                   class="form-control"
                   required>
        </div>

        <textarea th:field="*{description}"
                  placeholder="Product Description"
                  class="form-control mb-3"
                  rows="4"></textarea>

        <input type="text"
               th:field="*{imageUrl}"
               placeholder="Product Image URL"
               class="form-control mb-3">

        <input type="number"
               th:field="*{stockQuantity}"
               placeholder="Stock Quantity"
               class="form-control mb-4"
               required>

        <button type="submit" class="btn btn-primary">Update Product</button>
        <a th:href="@{/}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
