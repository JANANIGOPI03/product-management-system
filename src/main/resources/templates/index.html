<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Product Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

	<div class="d-flex justify-content-between align-items-center mb-4">
	    <h1>Product Management System</h1>

	    <form th:action="@{/logout}" method="post">
	        <button type="submit" class="btn btn-danger">Logout</button>
	    </form>
	</div>
	
	<div class="mb-3">
	    <a th:href="@{/showNewProductForm}" class="btn btn-primary">Add New Product</a>
	    <a th:href="@{/orders}" class="btn btn-dark">View Orders</a>
	</div>

    <table class="table table-bordered table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Product Name</th>
            <th>Product ID</th>
            <th>Product Quality</th>
            <th>Product Price</th>
            <th>Product Image</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${listProducts}">
            <td th:text="${product.productName}"></td>
            <td th:text="${product.productId}"></td>
            <td th:text="${product.productQuality}"></td>
            <td th:text="'$' + ${#numbers.formatDecimal(product.productPrice, 1, 2)}"></td>
            <td>
				    <br>
                <img th:src="${product.imageUrl}" alt="Product Image" width="100">
            </td>
            <td>
                <a th:href="@{/showFormForUpdate/{id}(id=${product.id})}"
                   class="btn btn-success btn-sm me-2">Update</a>
                <a th:href="@{/deleteProduct/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
