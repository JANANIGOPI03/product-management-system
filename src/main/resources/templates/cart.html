<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Shopping Cart</h1>

    <div class="mb-3">
        <a th:href="@{/shop}" class="btn btn-secondary">Continue Shopping</a>
    </div>

    <table class="table table-bordered table-striped" th:if="${cartItems != null and !cartItems.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.productName}"></td>
            <td th:text="'$' + ${#numbers.formatDecimal(item.productPrice, 1, 2)}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="'$' + ${#numbers.formatDecimal(item.totalPrice, 1, 2)}"></td>
            <td>
                <a th:href="@{/removeFromCart/{id}(id=${item.productId})}"
                   class="btn btn-danger btn-sm">Remove</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${cartItems == null or cartItems.isEmpty()}">
        <p>Your cart is empty.</p>
    </div>

    <div class="text-end mt-4">
        <h4 th:text="'Grand Total: $' + ${#numbers.formatDecimal(grandTotal, 1, 2)}"></h4>
    </div>
	<div class="text-end mt-3">
	    <a th:href="@{/checkout}" class="btn btn-success">Proceed to Checkout</a>
	</div>
</div>

</body>
</html>
